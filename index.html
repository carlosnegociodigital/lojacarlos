<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding-bottom: 40px; }
        header { background: linear-gradient(135deg, #ff4500, #ff6a00); color: white; text-align: center; padding: 40px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 2.2rem; margin-bottom: 8px; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.3s ease; border: 1px solid #eef2f5; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .image-container { position: relative; width: 100%; padding-top: 100%; background: #fafafa; }
        .image-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .store { font-size: 0.75rem; text-transform: uppercase; color: #ff5722; font-weight: bold; margin-bottom: 5px; letter-spacing: 0.5px; }
        .title { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: #2c3e50; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        .price-row { margin-bottom: 15px; display: flex; align-items: baseline; gap: 5px; }
        .price-label { font-size: 0.8rem; color: #7f8c8d; }
        .price { font-size: 1.4rem; font-weight: bold; color: #27ae60; }
        .btn-buy { display: block; text-align: center; background: #ff5722; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; transition: background 0.2s; margin-bottom: 8px; }
        .btn-buy:hover { background: #e64a19; }
        .btn-share { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 8px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; transition: background 0.2s; }
        .btn-share:hover { background: #20ba5a; }
    </style>
</head>

        const grid = document.getElementById('products-grid');

        products.forEach(p => {
            const wpText = encodeURIComponent(`Olha esse achadinho na Shopee: ${p.name} por apenas R$ ${p.price}! Veja aqui: ${p.link}`);
            const wpLink = `https://api.whatsapp.com/send?text=${wpText}`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="image-container">
                    <img src="${p.image}" alt="${p.name}" onerror="this.onerror=null;this.src='https://placehold.co/300x300?text=Ver+na+Shopee';">
                </div>
                <div class="content">
                    <div>
                        <div class="store">Loja: ${p.store}</div>

                    </div>
                    <div>
                        <div class="price-row">
